    "evidence_refs": ["evidence://demo/execution-approval-correction"],
    "natural_language": "Do not execute medium or high risk actions without teacher confirmation and rollback."
  },
  "scope": { "artifact_types": ["execution_plan"] },
  "inputs_required": ["artifact.risk_level", "artifact.approval.teacher_confirmed", "artifact.rollback_point.exists"],
  "constraint": {
    "type": "policy_gate",
    "validator": "execution_approval_gate",
    "params": {
      "require_teacher_confirmed": true,
      "require_rollback_point": true,
      "high_risk_levels": ["medium", "high"]
    }
  },
  "failure": {
    "message": "Teacher approval or rollback point is missing.",
    "action": "block_execution",
    "remediation_hint": "Collect teacher approval receipt and retained rollback point before execution."
  },
