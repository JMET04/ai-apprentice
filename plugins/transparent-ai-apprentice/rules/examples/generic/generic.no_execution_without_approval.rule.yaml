{
  "dsl_version": "0.1",
  "rule_id": "generic.no_execution_without_teacher_approval",
  "title": "No risky execution without teacher approval and rollback",
  "domain": "system.execution",
  "lifecycle": "active",
  "severity": "blocking",
  "owner": {
    "teacher_id": "teacher.local",
    "reviewer_id": "qa.local",
    "approved_at": "2026-06-12T00:00:00+08:00"
