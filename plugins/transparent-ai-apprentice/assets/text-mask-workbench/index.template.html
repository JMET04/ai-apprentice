<div class="shell">
<header class="appbar"><div class="brand"><span class="mark">AI</span><div><strong>文字修改蒙版</strong><small>Word / Excel 原生文字定位</small></div></div><div class="source-summary"><span>当前来源</span><strong id="sourceSummary">项目周报.docx</strong><code id="locatorSummary">Word paragraph:12</code></div><div class="bar-actions"><span class="review"><i></i>老师审校模式</span><button class="icon mobile-toggle" id="openInspector" aria-label="打开修改检查器"><svg><use href="#menu"/></svg></button></div></header>
<main class="work"><div class="toolbar" role="toolbar" aria-label="文字范围蒙版工具"><div class="zone-switch" aria-label="蒙版语义"><button data-zone="modify" class="active" aria-pressed="true"><i></i>修改区</button><button data-zone="protect" aria-pressed="false"><i></i>保护区</button><button data-zone="reference" aria-pressed="false"><i></i>参考关系</button></div><span class="sep"></span><button class="tool active" data-tool="brush" aria-pressed="true"><svg><use href="#brush"/></svg><span>画笔</span></button><button class="tool" data-tool="rect" aria-pressed="false"><svg><use href="#box"/></svg><span>矩形</span></button><label class="width"><span>粗细</span><input id="width" type="range" min="3" max="24" value="8"><output>8 px</output></label><span class="sep"></span><button class="icon" id="undoButton" aria-label="撤销"><svg><use href="#undo"/></svg></button><button class="icon" id="redoButton" aria-label="重做"><svg><use href="#redo"/></svg></button><button class="icon" id="toggleOverlay" aria-label="隐藏或显示蒙版" aria-pressed="true"><svg><use href="#eye"/></svg></button><button class="danger" id="clearButton"><svg><use href="#trash"/></svg><span>清空</span></button></div><div class="statusbar"><span>语义 <strong id="zoneState">修改区</strong></span><span>工具 <strong id="toolState">自由画笔</strong></span><span>范围 <strong id="maskCount">0</strong></span><span class="native-note">蒙版只指位置 · 实际修改原生文字</span></div><section class="canvas-area"><div class="canvas-wrap" id="canvasWrap"><div class="paper" id="paper"><canvas id="documentCanvas" width="1200" height="760" aria-label="办公文档或表格预览"></canvas><canvas id="overlayCanvas" width="1200" height="760" aria-label="文字修改范围蒙版，支持鼠标和触控"></canvas></div></div><div class="legend"><span class="red">修改区</span><span class="green">保护区</span><span class="blue">参考关系</span></div><button class="fit" id="fitButton"><svg><use href="#fit"/></svg>适配</button></section></main>
<aside class="inspector" id="inspector"><header><div><span>原生文字修改</span><h1>修改指令</h1></div><button class="icon mobile-close" id="closeInspector" aria-label="关闭检查器"><svg><use href="#close"/></svg></button></header><div class="scroll"><section><h2>来源与定位</h2><label class="field"><span>办公类型</span><select id="officeType"><option value="docx">DOCX · Word 文档</option><option value="xlsx">XLSX · Excel 工作簿</option><option value="txt">TXT · 纯文本</option><option value="markdown">Markdown</option><option value="csv">CSV</option><option value="json">JSON</option><option value="screenshot">文档截图</option></select></label><label class="upload"><svg><use href="#upload"/></svg><span>选择文档或截图</span><input id="sourceFile" type="file" accept=".docx,.xlsx,.txt,.md,.markdown,.csv,.json,image/png,image/jpeg,image/webp"></label><label class="field"><span>原生定位器</span><input id="nativeLocator" value="Word paragraph:12" spellcheck="false"></label></section><section><h2>修改内容</h2><label class="field"><span>操作</span><select id="operation"><option value="replace_text">替换文字</option><option value="insert_after">在定位后插入</option><option value="delete_text">删除指定文字</option><option value="apply_format">只修改格式</option></select></label><label class="field"><span>待修改原文</span><textarea id="originalText" rows="3">本周包装试制已经全部验收，可进入量产。</textarea></label><label class="field"><span>替换文字</span><textarea id="replacementText" rows="4">本周包装试制已完成首轮审校，仍需技术人员确认后才能进入后续流程。</textarea></label><label class="field"><span>格式约束</span><input id="formatConstraints" value="保留原段落样式、字体、字号、行距与批注"></label></section><section><h2>不变量</h2><div class="checks"><label><input type="checkbox" checked>其他段落保持不变</label><label><input type="checkbox" checked>表格与图片结构保持不变</label><label><input type="checkbox" checked>公式、样式与编号保持不变</label></div><label class="field"><span>保护定位器</span><textarea id="protectedLocators" rows="3">Word paragraph:1-11&#10;Word paragraph:13-end</textarea></label></section><section class="boundary"><strong><i></i>人工审校边界</strong><p>提交只生成原生文字修改请求。未自动接受、未自动启用规则、包装仍保持锁定。</p></section></div><footer><div class="submit-state" id="submitState"><i></i><span>等待老师提交修改请求</span></div><button class="primary" id="submitButton"><svg><use href="#send"/></svg>提交文字修改审校</button><button class="secondary" id="previewPacket">预览 packet()</button></footer></aside>
</div><dialog id="clearDialog"><form method="dialog"><h2>清空全部范围？</h2><p>修改区、保护区和参考关系都会被清除，之后仍可撤销。</p><div><button value="cancel">取消</button><button value="confirm" class="confirm">确认清空</button></div></form></dialog><pre class="packet" id="packetPreview" hidden></pre><script>window.__MINGTU_OVERLAY_CONFIG__ = __OVERLAY_CONFIG__;</script><script>__INLINE_SCRIPT__</script><script>
  (() => {
    const config = window.__MINGTU_OVERLAY_CONFIG__ || {};
    const fields = config.initialFields || {};
    const typeMap = { word_docx: "docx", excel_xlsx: "xlsx", plain_text: "txt" };
    const officeType = document.querySelector("#officeType");
    if (typeMap[fields.textDocumentType]) {
      officeType.value = typeMap[fields.textDocumentType];
      officeType.dispatchEvent(new Event("change"));
    }
    const values = {
      nativeLocator: fields.textLocator,
      operation: fields.textOperation === "replace" ? "replace_text" : fields.textOperation,
      originalText: fields.sourceText,
      replacementText: fields.replacementText,
      formatConstraints: fields.typographyNote
    };
    for (const [id, value] of Object.entries(values)) {
      const field = document.querySelector(`#${id}`);
      if (field && value != null) field.value = value;
    }
    if (fields.textLocator) document.querySelector("#locatorSummary").textContent = fields.textLocator;
    if (config.initialBackdropName) document.querySelector("#sourceSummary").textContent = config.initialBackdropName;
  })();
</script><script>__MASK_SUBMISSION_CLIENT__</script><script>
  globalThis.AIApprenticeMaskSubmission.install({
    packet: () => globalThis.MingTuOverlay.packet(),
    button: document.querySelector("#submitButton"),
    stateElement: document.querySelector("#submitState"),
    config: window.__MINGTU_OVERLAY_CONFIG__
  });
</script></body></html>
