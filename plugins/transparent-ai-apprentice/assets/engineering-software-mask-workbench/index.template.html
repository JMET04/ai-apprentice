<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI 学徒 · 工程软件对象修改蒙版</title><style>__INLINE_STYLES__</style></head><body>
<svg class="sprite" aria-hidden="true"><symbol id="brush" viewBox="0 0 24 24"><path d="m14 4 6 6-9 9-7 1 1-7Z"/><path d="m12 6 6 6"/></symbol><symbol id="box" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="1"/></symbol><symbol id="undo" viewBox="0 0 24 24"><path d="M9 7 4 12l5 5"/><path d="M5 12h8a6 6 0 0 1 6 6"/></symbol><symbol id="redo" viewBox="0 0 24 24"><path d="m15 7 5 5-5 5"/><path d="M19 12h-8a6 6 0 0 0-6 6"/></symbol><symbol id="eye" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></symbol><symbol id="trash" viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13"/></symbol><symbol id="send" viewBox="0 0 24 24"><path d="m3 11 18-8-8 18-2-8-8-2Z"/></symbol><symbol id="menu" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></symbol><symbol id="close" viewBox="0 0 24 24"><path d="m5 5 14 14M19 5 5 19"/></symbol><symbol id="fit" viewBox="0 0 24 24"><path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/></symbol></svg>
<div class="shell"><header class="appbar"><div class="brand"><span class="mark">AI</span><div><strong>工程对象修改蒙版</strong><small>工程软件截图 / 原生对象定位</small></div></div><div class="source-summary"><span>当前装配</span><strong>运输外箱参数模型</strong><code>Object D04</code></div><div class="bar-actions"><span class="review"><i></i>老师审校模式</span><button class="icon mobile-toggle" id="openInspector" aria-label="打开对象检查器"><svg><use href="#menu"/></svg></button></div></header>
<main class="work"><div class="toolbar" role="toolbar" aria-label="工程对象范围蒙版工具"><div class="zone-switch"><button data-zone="modify" class="active" aria-pressed="true"><i></i>修改区</button><button data-zone="protect" aria-pressed="false"><i></i>保护区</button><button data-zone="reference" aria-pressed="false"><i></i>参考关系</button></div><span class="sep"></span><button class="tool active" data-tool="brush" aria-pressed="true"><svg><use href="#brush"/></svg><span>画笔</span></button><button class="tool" data-tool="rect" aria-pressed="false"><svg><use href="#box"/></svg><span>矩形</span></button><label class="width"><span>粗细</span><input id="width" type="range" min="3" max="24" value="7"><output>7 px</output></label><span class="sep"></span><button class="icon" id="undoButton" aria-label="撤销"><svg><use href="#undo"/></svg></button><button class="icon" id="redoButton" aria-label="重做"><svg><use href="#redo"/></svg></button><button class="icon" id="toggleOverlay" aria-label="隐藏或显示蒙版" aria-pressed="true"><svg><use href="#eye"/></svg></button><button class="danger" id="clearButton"><svg><use href="#trash"/></svg><span>清空</span></button></div><div class="statusbar"><span>目标 <strong>D04</strong></span><span>动作 <strong>设置尺寸</strong></span><span>目标值 <strong>450 mm</strong></span><span class="native-note">蒙版只辅助定位 · 实际修改原生工程对象</span></div><section class="canvas-area"><div class="canvas-wrap" id="canvasWrap"><div class="stage" id="stage"><canvas id="engineeringCanvas" width="1280" height="760" aria-label="工程软件对象视图"></canvas><canvas id="overlayCanvas" width="1280" height="760" aria-label="工程对象修改范围蒙版"></canvas></div></div><div class="legend"><span class="red">修改区</span><span class="green">保护区</span><span class="blue">参考关系</span></div><button class="fit" id="fitButton"><svg><use href="#fit"/></svg>适配</button></section></main>
<aside class="inspector" id="inspector"><header><div><span>原生工程对象修改</span><h1>对象指令</h1></div><button class="icon mobile-close" id="closeInspector" aria-label="关闭检查器"><svg><use href="#close"/></svg></button></header><div class="scroll"><section><h2>目标对象</h2><label class="field"><span>工程对象类型</span><select id="objectType"><option>尺寸标注</option><option>草图实体</option><option>特征</option><option>装配体组件</option><option>约束 / 配合</option><option>工程图对象</option></select></label><label class="field"><span>对象编号</span><input id="objectId" value="D04" spellcheck="false"></label><label class="field"><span>动作</span><select id="action"><option value="set_dimension">设置尺寸</option><option value="move_object">移动对象</option><option value="replace_constraint">替换约束</option><option value="suppress_feature">抑制特征</option><option value="update_annotation">修改工程标注</option></select></label></section><section><h2>目标值与单位</h2><div class="value-row"><label class="field"><span>目标值</span><input id="targetValue" type="number" value="450" step="0.1"></label><label class="field"><span>单位</span><select id="unit"><option>mm</option><option>cm</option><option>deg</option><option>in</option><option>无量纲</option></select></label></div><label class="field"><span>修改约束</span><textarea id="constraints" rows="4">只将 D04 改为 450 mm；保持尺寸方向、基准面和标注位置不变。</textarea></label></section><section><h2>保护对象与不变量</h2><label class="field"><span>保护对象编号</span><input id="protectIds" value="D08, D10"></label><div class="checks"><label><input type="checkbox" checked>其他实体保持不变</label><label><input type="checkbox" checked>现有约束与配合保持不变</label><label><input type="checkbox" checked>拓扑、特征顺序与文字保持不变</label></div><label class="field"><span>参考关系</span><textarea id="referenceRelations" rows="3">D04 参考基准面 FRONT&#10;与 D08 保持平行关系</textarea></label></section><section class="boundary"><strong><i></i>人工审校边界</strong><p>提交只生成对象级修改请求，不执行工程软件，不代表技术验收或包装投产。</p></section></div><footer><div class="submit-state" id="submitState"><i></i><span>等待老师提交对象修改请求</span></div><button class="primary" id="submitButton"><svg><use href="#send"/></svg>提交对象修改审校</button><button class="secondary" id="previewPacket">预览 packet()</button></footer></aside></div>
<dialog id="clearDialog"><form method="dialog"><h2>清空全部对象范围？</h2><p>修改区、保护区和参考关系都会被清除，之后仍可撤销。</p><div><button value="cancel">取消</button><button value="confirm" class="confirm">确认清空</button></div></form></dialog><pre class="packet" id="packetPreview" hidden></pre><script>window.__AI_APPRENTICE_OVERLAY_CONFIG__ = __OVERLAY_CONFIG__;</script><script>__INLINE_SCRIPT__</script><script>
  (() => {
    const config = window.__AI_APPRENTICE_OVERLAY_CONFIG__ || {};
    const fields = config.initialFields || {};
    const values = {
      objectId: fields.engineeringObjectId,
      action: fields.engineeringAction === "change_dimension" ? "set_dimension" : fields.engineeringAction,
      targetValue: fields.engineeringValue,
      unit: fields.engineeringUnit,
      constraints: fields.engineeringConstraint
    };
    for (const [id, value] of Object.entries(values)) {
      const field = document.querySelector(`#${id}`);
      if (field && value != null) field.value = value;
    }
  })();
</script><script>__MASK_SUBMISSION_CLIENT__</script><script>
  globalThis.AIApprenticeMaskSubmission.install({
    packet: () => globalThis.AIApprenticeOverlay.packet(),
    button: document.querySelector("#submitButton"),
    stateElement: document.querySelector("#submitState"),
    config: window.__AI_APPRENTICE_OVERLAY_CONFIG__
  });
</script></body></html>
