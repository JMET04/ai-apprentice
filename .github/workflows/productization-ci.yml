name: Core Product CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  DATABASE_URL: file:./dev.db
  AI_PROVIDER: mock
  AI_PROVIDER_MANUAL_ACCEPTED: "false"

jobs:
  core-product:
    name: Core Product
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare demo database
        run: npm run setup:demo

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Verify manual acceptance classification locks
        run: npm run verify:manual-acceptance-classification

      - name: Verify real-model adapter contract locks
        run: npm run verify:real-model-adapter-contract

      - name: Build product runtime
        run: npm run build

      - name: Start product runtime
        shell: powershell
        run: |
          Start-Process -FilePath npm.cmd -ArgumentList @('run','start:product','--','--hostname','127.0.0.1','--port','3000') -WindowStyle Hidden
          $deadline = (Get-Date).AddSeconds(60)
          $lastError = $null
          do {
            try {
              $response = Invoke-RestMethod -Uri 'http://127.0.0.1:3000/api/health' -TimeoutSec 5
            } catch {
              if ($_.Exception.Response) {
                $reader = New-Object IO.StreamReader($_.Exception.Response.GetResponseStream())
                $response = $reader.ReadToEnd() | ConvertFrom-Json
              } else {
                $lastError = $_.Exception.Message
                Start-Sleep -Seconds 2
                continue
              }
            }
            $requiredChecks = @($response.checks | Where-Object {
              $_.name -in @(
                'Database reachable',
                'Stable product task exists',
                'Real model adapter contract remains locked and verified',
                'AI service boundary is mock',
                'Packaging boundary remains locked'
              )
            })
            if (
              $response.responseMode -eq 'product_health_json_v1' -and
              $requiredChecks.Count -eq 5 -and
              @($requiredChecks | Where-Object { $_.status -ne 'pass' }).Count -eq 0
            ) {
              Write-Host "Core product runtime is ready at http://127.0.0.1:3000"
              exit 0
            }
            $lastError = "Runtime prerequisites are not ready: $($response | ConvertTo-Json -Compress)"
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)
          throw "Core product runtime did not become ready: $lastError"

      - name: Verify runtime routes and locked boundaries
        shell: powershell
        run: |
          $baseUrl = 'http://127.0.0.1:3000'
          foreach ($route in @('/', '/manual-test', '/handoff', '/api/product-readiness', '/api/ai-service-status')) {
            $routeResponse = Invoke-WebRequest -Uri "$baseUrl$route" -TimeoutSec 10 -UseBasicParsing
            if ($routeResponse.StatusCode -ne 200) {
              throw "Route $route returned $($routeResponse.StatusCode)."
            }
          }

          $ai = Invoke-RestMethod -Uri "$baseUrl/api/ai-service-status" -TimeoutSec 10
          if (
            $ai.responseMode -ne 'ai_service_runtime_status_json_v1' -or
            $ai.activeProvider -ne 'mock' -or
            $ai.realModelReady -ne $false -or
            $ai.safetyBoundary.accepted -ne $false -or
            $ai.safetyBoundary.packagingGated -ne $true
          ) {
            throw "AI service boundary is not safely locked: $($ai | ConvertTo-Json -Compress)"
          }

          Write-Host 'Core routes are reachable and AI acceptance/packaging boundaries remain locked.'
