name: Package AI Apprentice release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify plugin
        run: npm run verify:plugin
      - name: Build verified plugin ZIP
        run: npm run package:codex-plugin
      - name: Verify release checksum exists
        shell: powershell
        run: |
          if (-not (Test-Path -LiteralPath dist/SHA256SUMS.txt)) {
            throw "Packaging did not create dist/SHA256SUMS.txt"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: ai-apprentice-codex-plugin
          path: |
            dist/transparent-ai-apprentice-codex-plugin.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create $env:GITHUB_REF_NAME
          dist/transparent-ai-apprentice-codex-plugin.zip
          dist/SHA256SUMS.txt
          --verify-tag
          --latest
          --title "AI 学徒 $env:GITHUB_REF_NAME"
          --notes-file RELEASE_NOTES.md
